loop:
  run_dir: ../runs/appworld_traceunit
  run_id: appworld_traceunit
  iterations: 12
  resume: true
  max_failure_traces: 8
  max_attempts_per_packet: 4

protocol:
  condition: c3_full

benchmark:
  name: appworld
  worldcalib_root: /data/home/yuhan/WorldCalib
  baseline_source_path: /data/home/yuhan/WorldCalib/src/worldcalib/agentic/backends/appworld
  split_manifest_path: /data/home/yuhan/WorldCalib/data/appworld/split_challenge.json
  search_split: train
  heldout_split: test
  search_limit: 45
  final_limit: 60
  benchmark_seed: 1729
  model: deepseek-v4-flash
  base_url: https://api.deepseek.com
  api_key_env: DEEPSEEK_API_KEY
  concurrency: 4
  repeats: 1
  max_interactions: 100
  timeout_s: 600
  dry_run: false

agents:
  test_author:
    provider: codex
    isolation: docker
    container_image: node:20-slim
    reasoning_effort: high
    timeout_s: 1800
  search:
    provider: codex
    isolation: docker
    container_image: node:20-slim
    reasoning_effort: high
    timeout_s: 3600
  regression_author:
    provider: codex
    isolation: docker
    container_image: node:20-slim
    reasoning_effort: high
    timeout_s: 1800
    enabled: false
  ut_critic:
    provider: codex
    isolation: docker
    container_image: node:20-slim
    reasoning_effort: high
    timeout_s: 1800
    enabled: true

decision:
  max_regression_loss: 0.0
  min_search_delta: 0.0
  # One flipped task on a 45-task search pool is ~0.022; a knife-edge margin of
  # 0.0 would make latent retention require an exactly-zero paired delta.
  noninferiority_margin: 0.025

memory:
  max_world_model_lessons: 64
