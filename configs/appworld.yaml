loop:
  run_dir: ../runs/appworld_traceunit
  run_id: appworld_traceunit
  iterations: 5
  resume: true
  max_failure_traces: 8
  max_attempts_per_packet: 4

protocol:
  condition: c3_full

benchmark:
  name: appworld
  worldcalib_root: /data/home/yuhan/WorldCalib
  baseline_source_path: /data/home/yuhan/WorldCalib/src/worldcalib/agentic/backends/appworld
  split_manifest_path: /data/home/yuhan/WorldCalib/data/appworld/split_challenge.json
  search_split: train
  heldout_split: test
  search_limit: 45
  calibration_limit: 30
  calibration_shard_size: 9
  final_limit: 60
  benchmark_seed: 1729
  model: deepseek-v4-flash
  base_url: https://api.deepseek.com
  api_key_env: DEEPSEEK_API_KEY
  concurrency: 4
  repeats: 1
  max_interactions: 100
  timeout_s: 600
  dry_run: false

agents:
  test_author:
    provider: codex
    isolation: docker
    container_image: node:20-slim
    reasoning_effort: high
    timeout_s: 1800
  search:
    provider: codex
    isolation: docker
    container_image: node:20-slim
    reasoning_effort: high
    timeout_s: 3600
  regression_author:
    provider: codex
    isolation: docker
    container_image: node:20-slim
    reasoning_effort: high
    timeout_s: 1800
    enabled: false

decision:
  min_admission_score: 0.75
  min_public_gain: 1.0
  min_hidden_gain: 0.5
  min_bridge_gain: 0.5
  max_regression_loss: 0.0
  min_search_delta: 0.0
  noninferiority_margin: 0.0

alignment:
  min_candidates_per_checkpoint: 4
  max_candidates_per_checkpoint: 12
  min_effective_n: 3.0
  positive_margin: 0.0
  trigger_on_new_family: true
  trigger_on_disagreement: true
  trigger_on_novel_composition: true

archive:
  allow_semantic_port: true
