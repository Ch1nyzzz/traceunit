loop:
  run_dir: ../runs/appworld_traceunit_v4
  run_id: appworld_traceunit_v4
  iterations: 20
  resume: true
  max_failure_traces: 16
  max_attempts_per_packet: 4
  # A patch that fails the frozen unit tests goes back to the proposer with
  # the concrete failures this many times before search runs anyway.
  max_inner_retries: 3
  # Cap per capability group; the Test Author retires before adding more.
  max_instances_per_capability: 8

protocol:
  condition: c3_full

benchmark:
  name: appworld
  worldcalib_root: /data/home/yuhan/WorldCalib
  baseline_source_path: /data/home/yuhan/WorldCalib/src/worldcalib/agentic/backends/appworld
  split_manifest_path: /data/home/yuhan/WorldCalib/data/appworld/split_challenge.json
  search_split: train
  heldout_split: test
  search_limit: 45
  final_limit: 90
  benchmark_seed: 1729
  model: deepseek-v4-flash
  base_url: https://api.deepseek.com
  api_key_env: DEEPSEEK_API_KEY
  concurrency: 32
  repeats: 1
  max_interactions: 100
  timeout_s: 600
  dry_run: false

agents:
  test_author:
    provider: codex
    isolation: docker
    container_image: traceunit-agent:latest
    model: gpt-5.6-terra
    reasoning_effort: high
    timeout_s: 1800
  search:
    provider: codex
    isolation: docker
    container_image: traceunit-agent:latest
    model: gpt-5.6-terra
    reasoning_effort: high
    timeout_s: 3600
  regression_author:
    provider: codex
    isolation: docker
    container_image: traceunit-agent:latest
    model: gpt-5.6-terra
    reasoning_effort: high
    timeout_s: 1800
    enabled: false

decision:
  # C0 (score-only) promotion threshold; the battery conditions use the
  # noise margin below instead.
  min_search_delta: 0.0
  # A non-target capability group may not drop below its incumbent pass
  # rate by more than this fraction (collateral damage tolerance).
  max_battery_regression: 0.0
  # The noise margin: search "improved"/"regressed" means clearing this
  # paired delta; anything inside the band is flat. One flipped task on a
  # 45-task pool is ~0.022, so a two-task swing under repeats=1 stays noise.
  # An uncertified improvement beyond the margin triggers one confirmation
  # re-evaluation before it may promote.
  noninferiority_margin: 0.045
